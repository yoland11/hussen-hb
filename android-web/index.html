<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>حسين بيرام</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Noto Sans Arabic", "Segoe UI", Tahoma, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(56, 189, 120, 0.2), transparent 42%),
          linear-gradient(180deg, #f7fff8 0%, #eef8f1 100%);
        color: #123524;
      }

      main {
        width: min(92vw, 420px);
        padding: 28px 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(22, 101, 52, 0.1);
        box-shadow: 0 24px 80px rgba(22, 101, 52, 0.12);
        text-align: center;
      }

      .badge {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        background: linear-gradient(135deg, #16a34a, #22c55e);
        color: white;
        font-size: 28px;
        box-shadow: 0 18px 36px rgba(34, 197, 94, 0.28);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #3b5b47;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">📸</div>
      <h1>حسين بيرام</h1>
      <p>يتم الآن فتح نظام إدارة الحجوزات الآمن عبر الاتصال المباشر بالخادم.</p>
    </main>
  </body>
</html>
